<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>تركيب الصورة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;800;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0F211D;
    --bg-panel:#173330;
    --bg-panel-light:#1F413C;
    --accent-gold:#D4A24E;
    --accent-gold-dim:#8C743A;
    --accent-teal:#4CB3A3;
    --accent-coral:#E2653C;
    --text-light:#F4EFE6;
    --text-muted:#9FBAB2;
    --lock-color:#3C5450;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; min-height:100%;
    background:radial-gradient(circle at 50% 0%, var(--bg-panel) 0%, var(--bg-deep) 60%);
    color:var(--text-light);
    font-family:'Tajawal', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  h1,h2,h3,.display{ font-family:'Cairo', sans-serif; }
  #app{ min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:24px 16px 60px; }

  /* ---------- HEADER ---------- */
  .top-header{ width:100%; max-width:720px; text-align:center; margin-bottom:18px; }
  .top-header h1{
    font-size:clamp(28px,6vw,42px); font-weight:900; margin:0 0 4px;
    letter-spacing:1px; color:var(--accent-gold);
    text-shadow:0 2px 12px rgba(212,162,78,0.35);
  }
  .top-header p{ margin:0; color:var(--text-muted); font-size:14px; font-weight:500; }

  .score-pill{
    display:inline-flex; align-items:center; gap:8px;
    background:var(--bg-panel-light); border:1px solid var(--accent-gold-dim);
    border-radius:999px; padding:8px 18px; margin-top:14px;
    font-family:'Cairo',sans-serif; font-weight:800; font-size:15px;
  }
  .score-pill .dot{ width:8px; height:8px; border-radius:50%; background:var(--accent-gold); }

  /* ---------- MENU / LEVEL GRID ---------- */
  #menu-screen{ width:100%; max-width:720px; }
  .levels-grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(58px,1fr));
    gap:10px; margin-top:20px;
  }
  .level-btn{
    aspect-ratio:1/1; border-radius:14px; border:none; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:'Cairo',sans-serif; font-weight:800; font-size:15px;
    background:var(--bg-panel-light); color:var(--text-light);
    box-shadow: inset 0 0 0 1px rgba(212,162,78,0.15);
    transition: transform .12s ease;
    position:relative;
  }
  .level-btn:active{ transform:scale(0.93); }
  .level-btn.locked{ background:var(--bg-panel); color:var(--lock-color); cursor:not-allowed; box-shadow:none; }
  .level-btn.done{ background:linear-gradient(145deg,var(--accent-teal),#2C7A6D); color:#08201B; }
  .level-btn .star{ font-size:9px; margin-top:2px; color:var(--accent-gold); }
  .level-btn.locked .star{ display:none; }

  .tier-label{ margin:24px 0 4px; font-family:'Cairo',sans-serif; font-weight:700; font-size:13px; color:var(--text-muted); }

  .reset-link{
    display:block; text-align:center; margin-top:30px; color:var(--lock-color);
    font-size:12px; cursor:pointer; text-decoration:underline; background:none; border:none;
    font-family:'Tajawal',sans-serif; width:100%;
  }

  /* ---------- GAME SCREEN ---------- */
  #game-screen{ width:100%; max-width:520px; display:none; flex-direction:column; align-items:center; }
  .game-bar{
    width:100%; display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;
  }
  .icon-btn{
    background:var(--bg-panel-light); border:1px solid var(--accent-gold-dim); color:var(--text-light);
    border-radius:12px; padding:9px 14px; font-family:'Cairo',sans-serif; font-weight:700; font-size:14px;
    cursor:pointer; display:flex; align-items:center; gap:6px;
  }
  .stat-group{ display:flex; gap:10px; }
  .stat-box{
    background:var(--bg-panel-light); border-radius:12px; padding:7px 12px; text-align:center;
    min-width:64px;
  }
  .stat-box .label{ font-size:10px; color:var(--text-muted); display:block; }
  .stat-box .value{ font-family:'Cairo',sans-serif; font-weight:800; font-size:16px; color:var(--accent-gold); }

  .puzzle-wrap{
    width:100%; aspect-ratio:1/1; background:var(--bg-panel); border-radius:18px; padding:8px;
    box-shadow:0 12px 40px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(212,162,78,0.15);
  }
  .puzzle-grid{
    width:100%; height:100%; display:grid; gap:3px; border-radius:12px; overflow:hidden;
  }
  .tile{
    background-repeat:no-repeat; border-radius:4px; cursor:pointer;
    display:flex; align-items:flex-end; justify-content:flex-start;
    transition:transform .08s ease;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.25);
  }
  .tile:active{ transform:scale(0.96); }
  .tile.empty{ background:transparent; cursor:default; box-shadow:none; }

  .shuffle-btn{
    margin-top:16px; background:var(--accent-coral); border:none; color:#2B0F06;
    font-family:'Cairo',sans-serif; font-weight:800; font-size:14px; padding:12px 26px;
    border-radius:12px; cursor:pointer;
  }

  /* ---------- WIN OVERLAY ---------- */
  #win-overlay{
    position:fixed; inset:0; background:rgba(10,20,18,0.88); display:none;
    align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  .win-card{
    background:var(--bg-panel); border-radius:20px; padding:34px 28px; text-align:center;
    max-width:360px; width:100%; box-shadow:0 20px 60px rgba(0,0,0,0.5);
    border:1px solid var(--accent-gold-dim);
  }
  .win-card h2{ font-size:26px; color:var(--accent-gold); margin:0 0 8px; }
  .win-card p{ color:var(--text-muted); margin:0 0 18px; font-size:14px; }
  .win-score{ font-family:'Cairo',sans-serif; font-weight:900; font-size:38px; color:var(--accent-teal); margin-bottom:22px; }
  .win-actions{ display:flex; flex-direction:column; gap:10px; }
  .primary-btn{
    background:var(--accent-gold); color:#2B1D06; border:none; border-radius:12px;
    padding:13px; font-family:'Cairo',sans-serif; font-weight:800; font-size:15px; cursor:pointer;
  }
  .secondary-btn{
    background:transparent; color:var(--text-muted); border:1px solid var(--lock-color);
    border-radius:12px; padding:13px; font-family:'Cairo',sans-serif; font-weight:700; font-size:14px; cursor:pointer;
  }

  @media (max-width:420px){
    .stat-box{ min-width:52px; padding:6px 8px; }
    .icon-btn{ padding:8px 10px; font-size:13px; }
  }
</style>
</head>
<body>
<div id="app">

  <div class="top-header">
    <h1>🧩 تركيب الصورة</h1>
    <p>١٠٠ مرحلة تزداد تعقيداً — رتّب القطع وأعد تكوين الزخرفة</p>
    <div class="score-pill"><span class="dot"></span><span id="total-score-label">النقاط الكلية: 0</span></div>
  </div>

  <div id="menu-screen">
    <div id="levels-container"></div>
    <button class="reset-link" id="reset-progress-btn">إعادة تعيين التقدم</button>
  </div>

  <div id="game-screen">
    <div class="game-bar">
      <button class="icon-btn" id="back-btn">‹ رجوع</button>
      <div class="stat-group">
        <div class="stat-box"><span class="label">المرحلة</span><span class="value" id="stat-level">1</span></div>
        <div class="stat-box"><span class="label">الحركات</span><span class="value" id="stat-moves">0</span></div>
        <div class="stat-box"><span class="label">الوقت</span><span class="value" id="stat-time">00:00</span></div>
      </div>
    </div>
    <div class="puzzle-wrap">
      <div class="puzzle-grid" id="puzzle-grid"></div>
    </div>
    <button class="shuffle-btn" id="shuffle-btn">🔀 خلط جديد</button>
  </div>

</div>

<div id="win-overlay">
  <div class="win-card">
    <h2 id="win-title">أحسنت! 🎉</h2>
    <p id="win-sub">أنجزت المرحلة بنجاح</p>
    <div class="win-score" id="win-score">+0</div>
    <div class="win-actions">
      <button class="primary-btn" id="next-level-btn">المرحلة التالية ›</button>
      <button class="secondary-btn" id="menu-btn">رجوع للقائمة</button>
    </div>
  </div>
</div>

<script>
(function(){
  const TOTAL_LEVELS = 100;
  const STORAGE_KEY = 'jigsaw_progress_v1';

  let progress = { unlocked:1, totalScore:0, levelBest:{} };
  let state = { level:1, board:[], emptySlot:0, gridSize:3, moves:0, elapsed:0, timerId:null, playing:false, imageData:null };

  /* ---------------- Persistence ---------------- */
  async function loadProgress(){
    try{
      const res = await window.storage.get(STORAGE_KEY);
      if(res && res.value){
        const parsed = JSON.parse(res.value);
        progress = Object.assign(progress, parsed);
      }
    }catch(e){ /* no saved progress yet */ }
    renderMenu();
    updateTotalScoreLabel();
  }
  async function saveProgress(){
    try{ await window.storage.set(STORAGE_KEY, JSON.stringify(progress)); }
    catch(e){ console.error('save failed', e); }
  }

  function updateTotalScoreLabel(){
    document.getElementById('total-score-label').textContent = 'النقاط الكلية: ' + progress.totalScore;
  }

  /* ---------------- Difficulty scaling ---------------- */
  function gridSizeForLevel(level){
    const tier = Math.min(5, Math.floor((level-1)/17));
    return 3 + tier; // 3..8
  }
  function shuffleMovesForLevel(level){
    return 40 + level*4;
  }

  /* ---------------- Procedural mandala image ---------------- */
  function seededRandomFactory(seed){
    let s = seed % 2147483647; if(s<=0) s += 2147483646;
    return function(){ s = (s*16807) % 2147483647; return (s-1)/2147483646; };
  }
  const PALETTE = ['#D4A24E','#4CB3A3','#E2653C','#8C743A','#2C7A6D','#F4EFE6','#B5482F'];

  function generateImage(level, px){
    const canvas = document.createElement('canvas');
    canvas.width = px; canvas.height = px;
    const ctx = canvas.getContext('2d');
    const rand = seededRandomFactory(level*7919 + 13);

    // background
    const g = ctx.createRadialGradient(px/2,px/2,px*0.05, px/2,px/2,px*0.72);
    g.addColorStop(0, '#1F413C');
    g.addColorStop(1, '#0F211D');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,px,px);

    const petals = 5 + (level % 9);
    const layers = 3 + Math.floor(level/22);
    ctx.translate(px/2, px/2);

    for(let l=0; l<layers; l++){
      const baseRadius = (px/2) * (0.22 + l*(0.62/layers));
      const size = (px/2) * (0.16 - l*0.012);
      for(let p=0; p<petals; p++){
        const angle = (p/petals)*Math.PI*2 + l*0.35 + rand()*0.15;
        ctx.save();
        ctx.rotate(angle);
        ctx.fillStyle = PALETTE[(l*3+p) % PALETTE.length];
        ctx.globalAlpha = 0.88;
        ctx.beginPath();
        ctx.ellipse(baseRadius, 0, Math.max(4,size), Math.max(3,size*0.55), 0, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      }
    }
    // center medallion
    ctx.beginPath();
    ctx.fillStyle = PALETTE[level % PALETTE.length];
    ctx.arc(0,0, px*0.06 + layers*1.5, 0, Math.PI*2);
    ctx.fill();
    ctx.setTransform(1,0,0,1,0,0);

    // outer ring
    ctx.strokeStyle = 'rgba(212,162,78,0.5)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(px/2, px/2, px*0.48, 0, Math.PI*2);
    ctx.stroke();

    return canvas.toDataURL('image/png');
  }

  /* ---------------- Menu rendering ---------------- */
  function renderMenu(){
    const container = document.getElementById('levels-container');
    container.innerHTML = '';
    const tierNames = ['3×3 — بداية هادئة','4×4 — تركيز أعلى','5×5 — تحدٍ حقيقي','6×6 — مستوى الخبراء','7×7 — درجة الصعوبة القصوى','8×8 — التحدي الأسطوري'];
    let lastTier = -1;

    for(let lvl=1; lvl<=TOTAL_LEVELS; lvl++){
      const tier = Math.min(5, Math.floor((lvl-1)/17));
      if(tier !== lastTier){
        const label = document.createElement('div');
        label.className = 'tier-label';
        label.textContent = tierNames[tier];
        container.appendChild(label);
        const grid = document.createElement('div');
        grid.className = 'levels-grid';
        grid.id = 'grid-tier-' + tier;
        container.appendChild(grid);
        lastTier = tier;
      }
      const grid = document.getElementById('grid-tier-' + tier);
      const btn = document.createElement('button');
      const locked = lvl > progress.unlocked;
      const best = progress.levelBest[lvl];
      btn.className = 'level-btn' + (locked ? ' locked' : '') + (best ? ' done' : '');
      btn.innerHTML = (locked ? '🔒' : lvl) + (best ? '<span class="star">★ '+best+'</span>' : '');
      if(!locked){ btn.addEventListener('click', () => startLevel(lvl)); }
      grid.appendChild(btn);
    }
  }

  /* ---------------- Board logic ---------------- */
  function solvedBoard(n){
    const arr = [];
    for(let i=0;i<n*n;i++) arr.push(i);
    return arr;
  }
  function idxToRC(i,n){ return [Math.floor(i/n), i%n]; }
  function isAdjacent(a,b,n){
    const [r1,c1] = idxToRC(a,n), [r2,c2] = idxToRC(b,n);
    return (r1===r2 && Math.abs(c1-c2)===1) || (c1===c2 && Math.abs(r1-r2)===1);
  }
  function shuffleBoard(n, moves){
    let board = solvedBoard(n);
    let empty = n*n-1;
    let lastMoved = -1;
    const rand = seededRandomFactory(Date.now() % 100000 + moves);
    for(let i=0;i<moves;i++){
      const neighbors = [];
      const [r,c] = idxToRC(empty,n);
      if(r>0) neighbors.push(empty-n);
      if(r<n-1) neighbors.push(empty+n);
      if(c>0) neighbors.push(empty-1);
      if(c<n-1) neighbors.push(empty+1);
      const candidates = neighbors.filter(x => x !== lastMoved);
      const pick = candidates[Math.floor(rand()*candidates.length)];
      [board[empty], board[pick]] = [board[pick], board[empty]];
      lastMoved = empty;
      empty = pick;
    }
    return { board, empty };
  }

  /* ---------------- Game flow ---------------- */
  function startLevel(level){
    stopTimer();
    state.level = level;
    state.gridSize = gridSizeForLevel(level);
    state.moves = 0;
    state.elapsed = 0;
    state.playing = true;
    state.imageData = generateImage(level, 640);
    const { board, empty } = shuffleBoard(state.gridSize, shuffleMovesForLevel(level));
    state.board = board;
    state.emptySlot = empty;

    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    document.getElementById('stat-level').textContent = level;
    document.getElementById('stat-moves').textContent = '0';
    document.getElementById('stat-time').textContent = '00:00';

    renderGrid();
    startTimer();
  }

  function renderGrid(){
    const n = state.gridSize;
    const grid = document.getElementById('puzzle-grid');
    grid.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
    grid.style.gridTemplateRows = `repeat(${n}, 1fr)`;
    grid.innerHTML = '';

    state.board.forEach((tileValue, idx) => {
      const div = document.createElement('div');
      const isEmpty = tileValue === n*n-1;
      div.className = 'tile' + (isEmpty ? ' empty' : '');
      if(!isEmpty){
        const [tr, tc] = idxToRC(tileValue, n);
        div.style.backgroundImage = `url(${state.imageData})`;
        div.style.backgroundSize = `${n*100}% ${n*100}%`;
        div.style.backgroundPosition = `${(tc/(n-1))*100}% ${(tr/(n-1))*100}%`;
        div.addEventListener('click', () => handleTileClick(idx));
      }
      grid.appendChild(div);
    });
  }

  function handleTileClick(idx){
    if(!state.playing) return;
    const n = state.gridSize;
    if(!isAdjacent(idx, state.emptySlot, n)) return;
    [state.board[idx], state.board[state.emptySlot]] = [state.board[state.emptySlot], state.board[idx]];
    state.emptySlot = idx;
    state.moves++;
    document.getElementById('stat-moves').textContent = state.moves;
    renderGrid();
    if(checkSolved()) onLevelComplete();
  }

  function checkSolved(){
    for(let i=0;i<state.board.length;i++){
      if(state.board[i] !== i) return false;
    }
    return true;
  }

  function startTimer(){
    state.timerId = setInterval(() => {
      state.elapsed++;
      const m = String(Math.floor(state.elapsed/60)).padStart(2,'0');
      const s = String(state.elapsed%60).padStart(2,'0');
      document.getElementById('stat-time').textContent = `${m}:${s}`;
    }, 1000);
  }
  function stopTimer(){
    if(state.timerId){ clearInterval(state.timerId); state.timerId = null; }
  }

  function onLevelComplete(){
    state.playing = false;
    stopTimer();
    const n = state.gridSize;
    const base = n*n*50;
    const movesPenalty = state.moves*2;
    const timePenalty = state.elapsed*1;
    const levelBonus = state.level*5;
    const score = Math.max(80, base - movesPenalty - timePenalty) + levelBonus;

    const prevBest = progress.levelBest[state.level] || 0;
    if(score > prevBest){
      progress.totalScore += (score - prevBest);
      progress.levelBest[state.level] = score;
    }
    if(state.level === progress.unlocked && progress.unlocked < TOTAL_LEVELS){
      progress.unlocked = state.level + 1;
    }
    saveProgress();
    updateTotalScoreLabel();

    document.getElementById('win-score').textContent = '+' + score;
    document.getElementById('win-sub').textContent = `المرحلة ${state.level} — ${n}×${n} — ${state.moves} حركة — ${document.getElementById('stat-time').textContent}`;
    const nextBtn = document.getElementById('next-level-btn');
    nextBtn.style.display = state.level < TOTAL_LEVELS ? 'block' : 'none';
    document.getElementById('win-overlay').style.display = 'flex';
  }

  /* ---------------- Buttons ---------------- */
  document.getElementById('back-btn').addEventListener('click', () => {
    stopTimer();
    state.playing = false;
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('menu-screen').style.display = 'block';
    renderMenu();
  });

  document.getElementById('shuffle-btn').addEventListener('click', () => startLevel(state.level));

  document.getElementById('next-level-btn').addEventListener('click', () => {
    document.getElementById('win-overlay').style.display = 'none';
    startLevel(state.level + 1);
  });

  document.getElementById('menu-btn').addEventListener('click', () => {
    document.getElementById('win-overlay').style.display = 'none';
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('menu-screen').style.display = 'block';
    renderMenu();
  });

  document.getElementById('reset-progress-btn').addEventListener('click', async () => {
    if(!confirm('هل تريد إعادة تعيين كل التقدم والنقاط؟')) return;
    progress = { unlocked:1, totalScore:0, levelBest:{} };
    await saveProgress();
    updateTotalScoreLabel();
    renderMenu();
  });

  loadProgress();
})();
</script>
</body>
</html>
